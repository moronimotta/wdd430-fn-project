<section class="products-shell">
  <div class="products-header card">
    <div>
      <p class="eyebrow">Catalog</p>
      <h2 class="section-title">Featured textbooks</h2>
    </div>
    <div class="catalog-summary">
      <span>{{ products.length }} products</span>
    </div>
  </div>

  <div class="product-grid">
    <article class="product-card card" *ngFor="let product of products">
      <img class="product-image" [src]="product.image" [alt]="product.name" />

      <div class="product-copy">
        <div class="product-heading">
          <h3>{{ product.name }}</h3>
          <span class="price">$ {{ product.price }}</span>
        </div>

        <p class="muted">{{ product.description }}</p>

        <div class="product-meta">
          <span class="pill">Stock {{ product.stock }}</span>
          <span class="pill">Textbook</span>
        </div>
      </div>

      <button class="button primary" (click)="addToCart(product)">Add to Cart</button>
    </article>
  </div>
</section>
